<!DOCTYPE html>
<html>
<head>
  <title>GKE Demo</title>
</head>
<body>
  <h1>Frontend Running 🚀</h1>
  <button onclick="callAPI()">Call Backend</button>
  <pre id="output"></pre>

  <script>
    function callAPI() {
      fetch('/api/')
        .then(res => res.json())
        .then(data => {
          document.getElementById('output').innerText =
            JSON.stringify(data, null, 2);
        });
    }
  </script>
</body>
</html>
